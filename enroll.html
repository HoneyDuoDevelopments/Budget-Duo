<!DOCTYPE html>
<html>
<head><title>Teller Enrollment</title></head>
<body>
  <h2>Connect Bank Account</h2>
  <button id="connect">Connect Bank Account</button>
  <div id="result" style="margin-top:20px;font-family:monospace;"></div>

  <script src="https://cdn.teller.io/connect/connect.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var tellerConnect = TellerConnect.setup({
        applicationId: "app_ppu15f0b8mq54misqa000",
        environment: "development",
        products: ["transactions", "balance", "identity"],
        selectAccount: "multiple",
        onSuccess: function(enrollment) {
          document.getElementById("result").innerHTML =
            "<strong>ACCESS TOKEN (save this to Vaultwarden):</strong><br>" +
            enrollment.accessToken + "<br><br>" +
            "<strong>Enrollment ID:</strong><br>" +
            enrollment.enrollment.id + "<br><br>" +
            "<strong>Institution:</strong><br>" +
            enrollment.enrollment.institution.name;
        },
        onExit: function() {
          document.getElementById("result").innerHTML = "Closed without enrolling.";
        }
      });
      document.getElementById("connect").addEventListener("click", function() {
        tellerConnect.open();
      });
    });
  </script>
</body>
</html>
