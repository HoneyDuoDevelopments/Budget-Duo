<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Duo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--s1:#0d1117;--s2:#111820;--s3:#161f2a;--s4:#1b2638;--s5:#21303f;
  --ln:#1b2638;--ln2:#243347;--ln3:#2e4058;
  --t1:#dce8f5;--t2:#7a90aa;--t3:#3d5268;--t4:#1e2f40;
  --green:#00e5a0;--gd:rgba(0,229,160,.08);--gb:rgba(0,229,160,.2);
  --red:#ff5272;--rd:rgba(255,82,114,.08);--rb:rgba(255,82,114,.2);
  --amber:#ffb340;--ad:rgba(255,179,64,.08);--ab:rgba(255,179,64,.2);
  --blue:#3d9eff;--bd:rgba(61,158,255,.08);--bb:rgba(61,158,255,.2);
  --purple:#b388ff;--pd:rgba(179,136,255,.08);--pb:rgba(179,136,255,.2);
  --cyan:#00d4e8;--cd:rgba(0,212,232,.07);
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --r:4px;--r2:8px;--sidebar:244px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px}

/* ═══ LAYOUT ═══ */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--s1);border-right:1px solid var(--ln);display:flex;flex-direction:column;overflow-y:auto;z-index:100}
.main{overflow-y:auto;background:var(--bg)}

/* ═══ MOBILE TOP BAR (hidden on desktop) ═══ */
.mobile-bar{display:none;position:sticky;top:0;z-index:90;background:var(--s1);border-bottom:1px solid var(--ln);padding:10px 14px;align-items:center;gap:10px}
.hamburger{background:none;border:1px solid var(--ln2);color:var(--t2);width:36px;height:36px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hamburger:hover{border-color:var(--bb);color:var(--t1)}
.mobile-bar .sb-title{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.3px}
.mobile-bar .sb-title span{color:var(--green)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}

/* ═══ SIDEBAR ═══ */
.sb-brand{padding:20px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--ln)}
.sb-logo{width:28px;height:28px;background:var(--green);border-radius:var(--r);display:grid;place-items:center;flex-shrink:0}
.sb-logo svg{width:14px;height:14px;fill:var(--bg)}
.sb-title{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.3px}
.sb-title span{color:var(--green)}
.sb-close{display:none;background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;margin-left:auto;padding:4px}
.sb-sec{padding:14px 16px 4px;font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px}
.nav{display:flex;align-items:center;gap:9px;padding:7px 10px;margin:1px 6px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:13px;border:none;background:none;width:calc(100% - 12px);text-align:left;transition:all .1s}
.nav:hover{background:var(--s2);color:var(--t1)}
.nav.on{background:var(--gd);color:var(--green);border:1px solid var(--gb)}
.nav svg{width:14px;height:14px;flex-shrink:0;opacity:.6}
.nav.on svg{opacity:1}
.nav-badge{margin-left:auto;background:var(--rd);color:var(--red);border:1px solid var(--rb);font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px}
.sb-period{margin:10px 8px;background:var(--s2);border:1px solid var(--ln2);border-radius:var(--r2);padding:12px}
.sb-period-label{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.period-toggle{display:flex;background:var(--s3);border-radius:var(--r);padding:2px;margin-bottom:8px}
.period-btn{flex:1;font-family:var(--mono);font-size:10px;padding:4px;border:none;background:none;color:var(--t2);cursor:pointer;border-radius:3px;transition:all .1s}
.period-btn.on{background:var(--s5);color:var(--t1)}
.period-row{display:flex;gap:4px}
.period-sel{flex:1;background:var(--s3);border:1px solid var(--ln2);color:var(--t1);font-family:var(--mono);font-size:11px;padding:5px 7px;border-radius:var(--r);outline:none;cursor:pointer}
.sb-bottom{margin-top:auto;padding:10px}
.sync-btn{width:100%;background:var(--s2);border:1px solid var(--ln2);color:var(--t2);font-family:var(--mono);font-size:11px;padding:9px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:7px;justify-content:center;transition:all .15s}
.sync-btn:hover{border-color:var(--gb);color:var(--green)}
.sync-btn.busy{color:var(--amber);border-color:var(--ab);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}

/* ═══ TOPBAR + CONTENT ═══ */
.topbar{padding:22px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.topbar-title{font-size:18px;font-weight:600;letter-spacing:-.3px}
.topbar-sub{font-family:var(--mono);font-size:11px;color:var(--t3);margin-top:2px}
.content{padding:16px 24px 40px;display:flex;flex-direction:column;gap:14px}

/* ═══ KPI GRID ═══ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r2) var(--r2) 0 0}
.kpi.g::after{background:linear-gradient(90deg,var(--green),transparent 70%)}
.kpi.r::after{background:linear-gradient(90deg,var(--red),transparent 70%)}
.kpi.b::after{background:linear-gradient(90deg,var(--blue),transparent 70%)}
.kpi.a::after{background:linear-gradient(90deg,var(--amber),transparent 70%)}
.kpi.p::after{background:linear-gradient(90deg,var(--purple),transparent 70%)}
.kpi.c::after{background:linear-gradient(90deg,var(--cyan),transparent 70%)}
.kpi-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);margin-bottom:8px}
.kpi-val{font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:-.5px;line-height:1}
.kpi-val.g{color:var(--green)}.kpi-val.r{color:var(--red)}.kpi-val.b{color:var(--blue)}
.kpi-val.a{color:var(--amber)}.kpi-val.p{color:var(--purple)}.kpi-val.c{color:var(--cyan)}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:5px}
.kpi-alert{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;color:var(--amber);background:var(--ad);border:1px solid var(--ab);padding:2px 6px;border-radius:3px;margin-top:5px;cursor:pointer}

/* ═══ PANELS ═══ */
.panel{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden}
.ph{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--ln);min-height:42px;flex-wrap:wrap}
.ph-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t2)}
.ph-stat{font-family:var(--mono);font-size:11px;color:var(--t3)}
.ph-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ═══ FILTERS ═══ */
.fbar{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--ln);flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:140px}
.sw svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);width:12px;height:12px;pointer-events:none}
.si{background:var(--s2);border:1px solid var(--ln2);color:var(--t1);font-family:var(--sans);font-size:12px;padding:5px 8px 5px 27px;border-radius:var(--r);width:100%;outline:none;transition:border-color .12s}
.si:focus{border-color:var(--bb)}
.si::placeholder{color:var(--t3)}
.fp{background:var(--s2);border:1px solid var(--ln2);color:var(--t2);font-family:var(--mono);font-size:10px;padding:5px 8px;border-radius:var(--r);outline:none;cursor:pointer;white-space:nowrap}
.fp:hover,.fp:focus{border-color:var(--bb);color:var(--t1)}
.fp.on{border-color:var(--bb);background:var(--bd);color:var(--blue)}
.cbadge{font-family:var(--mono);font-size:10px;color:var(--t3);white-space:nowrap}
.clr-btn{background:none;border:1px solid var(--ln2);color:var(--t3);font-family:var(--mono);font-size:9px;padding:4px 7px;border-radius:var(--r);cursor:pointer}
.clr-btn:hover{color:var(--red);border-color:var(--rb)}

/* ═══ TABLE ═══ */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:820px}
th{text-align:left;padding:7px 10px;font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.9px;border-bottom:1px solid var(--ln);font-weight:400;white-space:nowrap;background:var(--s1)}
td{padding:6px 10px;border-bottom:1px solid var(--ln);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.01)}
tr.tr-inc td{background:rgba(0,229,160,.02)}
tr.tr-xfer td{opacity:.4}
tr.tr-ign td{opacity:.28}
tr.tr-saving td{background:rgba(61,158,255,.06);transition:background .3s}
.td-date{font-family:var(--mono);font-size:10px;color:var(--t2);white-space:nowrap}
.td-m{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.td-raw{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
/* V4.2: Amount coloring by txn_class */
.td-amt{font-family:var(--mono);font-size:12px;font-weight:600;text-align:right;white-space:nowrap}
.td-amt.amt-income{color:var(--green)}
.td-amt.amt-expense{color:var(--t1)}
.td-amt.amt-neutral{color:var(--t3)}
.td-pills{display:flex;gap:3px;flex-wrap:wrap}
.badge{font-size:9px;font-family:var(--mono);padding:2px 5px;border-radius:3px;font-weight:500;white-space:nowrap;border:1px solid transparent}
.b-inc{background:var(--gd);color:var(--green);border-color:var(--gb)}
.b-xfr{background:var(--s3);color:var(--t3)}
.b-inv{background:var(--pd);color:var(--purple)}
.b-sub{background:var(--ad);color:var(--amber);border-color:var(--ab)}
.b-sav{background:var(--bd);color:var(--blue);border-color:var(--bb)}
.b-sam{background:var(--ad);color:var(--amber);border-color:var(--ab)}
.b-jess{background:var(--gd);color:var(--green);border-color:var(--gb)}
.b-joint{background:var(--bd);color:var(--blue);border-color:var(--bb)}
.b-exp{background:var(--rd);color:var(--red);border-color:var(--rb)}
.vdot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--green);margin-left:4px;vertical-align:middle;opacity:.8}
.isel{background:var(--s2);border:1px solid var(--ln);color:var(--t2);font-family:var(--mono);font-size:10px;padding:2px 5px;border-radius:var(--r);outline:none;cursor:pointer;margin-top:2px;display:block;width:100%;max-width:150px;transition:border-color .1s}
.isel:hover,.isel:focus{border-color:var(--bb)}
.isel.set{color:var(--t1);border-color:var(--ln3)}
.isel.income{color:var(--green)}.isel.expense{color:var(--t1)}
.isel.savings_in,.isel.savings_out{color:var(--blue)}
.isel.investment_in,.isel.investment_out{color:var(--purple)}
.isel.subscription{color:var(--amber)}
.isel.internal_transfer,.isel.cc_payment,.isel.ignore{color:var(--t3)}
.isel.trip-sel{border-color:var(--ab);color:var(--amber)}
.col-sep{border-left:1px solid var(--ln2)}

/* ═══ PAGINATION ═══ */
.pager{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--ln)}
.pg-btn{background:var(--s2);border:1px solid var(--ln2);color:var(--t2);font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:var(--r);cursor:pointer}
.pg-btn:hover:not(:disabled){border-color:var(--bb);color:var(--blue)}
.pg-btn:disabled{opacity:.25;cursor:not-allowed}
.pg-info{font-family:var(--mono);font-size:10px;color:var(--t3)}

/* ═══ ACCOUNT STRIP ═══ */
.acct-strip{display:flex;gap:6px;flex-wrap:wrap}
.ap{background:var(--s1);border:1px solid var(--ln);border-radius:var(--r2);padding:10px 13px;cursor:pointer;transition:all .12s;flex:1;min-width:120px}
.ap:hover{border-color:var(--ln3)}
.ap.sel{border-color:var(--blue);background:var(--bd)}
.ap.all{flex:0;min-width:65px}
.ap-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ap-inst{font-family:var(--mono);font-size:10px;color:var(--t2);margin-bottom:5px}
.ap-bal{font-family:var(--mono);font-size:13px;font-weight:600;margin-bottom:3px}
.ap-bal.chk{color:var(--blue)}.ap-bal.sav{color:var(--green)}.ap-bal.crd{color:var(--red)}

/* ═══ CATEGORIES / RULES / ENTRIES ═══ */
.cat-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);cursor:pointer;user-select:none}
.cat-row:hover{background:var(--s2)}
.cat-row.l1{background:var(--s2);margin-bottom:1px}
.cat-row.l1:hover{background:var(--s3)}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:13px;font-weight:500;flex:1}
.cat-bud{font-family:var(--mono);font-size:10px;color:var(--t3)}
.cat-acts{display:flex;gap:4px;opacity:0;transition:opacity .1s}
.cat-row:hover .cat-acts{opacity:1}
.cat-children{margin-left:16px;padding-left:10px;border-left:1px solid var(--ln);margin-top:1px;display:flex;flex-direction:column;gap:1px;margin-bottom:4px}
.rule-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--ln);transition:background .08s}
.rule-row:hover{background:var(--s2)}
.rule-row:last-child{border-bottom:none}
.rule-match{font-family:var(--mono);font-size:10px;color:var(--t2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rule-val{color:var(--t1);font-weight:600}
.rule-pills{display:flex;gap:3px;flex-wrap:wrap;flex-shrink:0}
.rp{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--ln3);color:var(--t2);white-space:nowrap}
.rp.cls{border-color:var(--bb);color:var(--blue);background:var(--bd)}
.rp.cat{border-color:var(--gb);color:var(--green);background:var(--gd)}
.rp.rec{border-color:var(--ab);color:var(--amber);background:var(--ad)}
.rule-cnt{font-family:var(--mono);font-size:10px;color:var(--t3);white-space:nowrap;min-width:44px;text-align:right}
.sys-tag{font-family:var(--mono);font-size:8px;padding:1px 4px;background:var(--s3);color:var(--t3);border-radius:2px}
.entry-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--ln)}
.entry-row:last-child{border-bottom:none}
.entry-type-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.entry-name{flex:1;font-size:13px}

/* ═══ FORMS ═══ */
.form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.fi{background:var(--s2);border:1px solid var(--ln2);color:var(--t1);font-family:var(--sans);font-size:12px;padding:6px 10px;border-radius:var(--r);outline:none;transition:border-color .12s;min-width:120px}
.fi:focus{border-color:var(--bb)}
.fi::placeholder{color:var(--t3)}
.fs{background:var(--s2);border:1px solid var(--ln2);color:var(--t2);font-family:var(--mono);font-size:11px;padding:6px 10px;border-radius:var(--r);outline:none;cursor:pointer}
.btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:var(--r);cursor:pointer;transition:all .12s;border:1px solid transparent;white-space:nowrap}
.btn-p{background:var(--bd);border-color:var(--bb);color:var(--blue)}
.btn-p:hover{background:var(--blue);color:var(--bg)}
.btn-s{background:var(--gd);border-color:var(--gb);color:var(--green)}
.btn-s:hover{background:var(--green);color:var(--bg)}
.btn-g{background:none;border-color:var(--ln2);color:var(--t2)}
.btn-g:hover{border-color:var(--ln3);color:var(--t1)}
.btn-d{background:var(--rd);border-color:var(--rb);color:var(--red)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.err{color:var(--red);font-family:var(--mono);font-size:10px;margin-top:4px}

/* ═══ TREND / SPENDING ═══ */
.trend-wrap{padding:16px}
.trend-bars{display:flex;align-items:flex-end;gap:6px;height:80px}
.trend-month{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.trend-bar-wrap{display:flex;gap:2px;align-items:flex-end;height:64px;width:100%}
.trend-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .3s}
.trend-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:center}
.spend-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--ln)}
.spend-row:last-child{border-bottom:none}
.spend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.spend-name{font-size:12px;flex:1}
.spend-sub{font-size:11px;color:var(--t2);margin-left:4px}
.spend-bar-wrap{flex:2;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.spend-bar{height:100%;border-radius:2px}
.spend-amt{font-family:var(--mono);font-size:11px;font-weight:600;text-align:right;white-space:nowrap;min-width:70px}
.spend-pct{font-family:var(--mono);font-size:9px;color:var(--t3);min-width:34px;text-align:right}

/* ═══ MISC ═══ */
.loading,.empty{padding:40px;text-align:center;color:var(--t3);font-family:var(--mono);font-size:12px}
.sec-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.icon-btn{background:none;border:1px solid transparent;color:var(--t3);font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:var(--r);cursor:pointer;transition:all .1s}
.icon-btn:hover{border-color:var(--ln3);color:var(--t1)}
.icon-btn.del:hover{border-color:var(--rb);color:var(--red)}
.icon-btn.edit-active{border-color:var(--bb);color:var(--blue);background:var(--bd)}

/* ═══════════════════════════════════════════════ */
/* MOBILE RESPONSIVE — hamburger + stacked layout */
/* ═══════════════════════════════════════════════ */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .mobile-bar{display:flex}
  .sidebar{position:fixed;top:0;left:-280px;width:280px;height:100vh;transition:left .25s ease;border-right:1px solid var(--ln)}
  .sidebar.open{left:0}
  .sidebar-overlay.open{display:block}
  .sb-close{display:block}
  .topbar{padding:14px 14px 0}
  .topbar-title{font-size:16px}
  .content{padding:12px 14px 40px;gap:12px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .kpi{padding:10px 12px}
  .kpi-val{font-size:16px}
  .kpi-label{font-size:8px;margin-bottom:5px}
  .two-col{grid-template-columns:1fr}

<script>
const {useState,useEffect,useCallback,useMemo,useRef} = React;
const html = htm.bind(React.createElement);
const API = '';
const fmt  = n => '$' + Math.abs(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = d => new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const shortName = n => n.replace('Adv Plus Banking','Checking').replace('Adv SafeBalance Banking','SafeBalance').replace('Advantage Savings','Savings').replace('Unlimited Cash Rewards Visa Signature','Cash Rewards').replace('Customized Cash Rewards Visa Signature','Custom Cash').replace('Costco Anywhere Visa® Card by Citi','Costco Visa').replace('Amex EveryDay® Card','Amex EveryDay').replace('360 Performance Savings','360 Savings').replace('360 Checking','Cap1 Checking');
const TXN_CLASSES = [{v:'income',label:'Income'},{v:'expense',label:'Expense'},{v:'savings_in',label:'Savings In'},{v:'savings_out',label:'Savings Out'},{v:'investment_in',label:'Investment In'},{v:'investment_out',label:'Investment Out'},{v:'subscription',label:'Subscription'},{v:'internal_transfer',label:'Internal Transfer'},{v:'cc_payment',label:'CC Payment'},{v:'ignore',label:'Ignore'}];
const RECURRING_TYPES = [{v:'subscription',label:'Subscription'},{v:'utility',label:'Utility'},{v:'recurring_expense',label:'Recurring Expense'},{v:'one_time',label:'One Time'},{v:'cancelled',label:'Cancelled'}];
const L1MAP = {income:'inc',expense:'exp',subscription:'sub',savings_in:'sav_in',savings_out:'sav_out',investment_in:'inv_in',investment_out:'inv_out',cc_payment:'cc_payment',internal_transfer:'transfer',ignore:'ignore'};

async function apiFetch(path, opts={}) {
  const res = await fetch(API+path, {credentials:'include',headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  if (!res.ok) {const err = await res.json().catch(()=>({detail:'Unknown error'}));throw new Error(err.detail||res.statusText);}
  return res.json();
}
function useAPI(path, deps=[]) {
  const [data,setData]=useState(null);const [loading,setLoading]=useState(true);const [error,setError]=useState(null);
  const load=useCallback(async()=>{if(!path)return;setLoading(true);try{setData(await apiFetch(path));setError(null);}catch(e){setError(e.message);}finally{setLoading(false);}},[path,...deps]);
  useEffect(()=>{load();},[load]);return {data,loading,error,reload:load};
}
const today=new Date();const CUR_YEAR=today.getFullYear();const CUR_MONTH=today.getMonth()+1;

function OB({owner}){const cls={sam:'b-sam',jess:'b-jess',joint:'b-joint'}[owner]||'';return owner?html`<span className=${`badge ${cls}`}>${owner}</span>`:null;}
function CB({cls}){if(!cls)return null;const map={income:html`<span className="badge b-inc">income</span>`,savings_in:html`<span className="badge b-sav">sav in</span>`,savings_out:html`<span className="badge b-sav">sav out</span>`,investment_in:html`<span className="badge b-inv">inv in</span>`,investment_out:html`<span className="badge b-inv">inv out</span>`,subscription:html`<span className="badge b-sub">sub</span>`,internal_transfer:html`<span className="badge b-xfr">transfer</span>`,cc_payment:html`<span className="badge b-xfr">cc pmt</span>`,ignore:html`<span className="badge" style=${{color:'var(--t4)'}}>ignore</span>`};return map[cls]||null;}

// V4.2: Amount coloring based on txn_class, not raw amount sign
function amtCls(t) {
  // Green: money arriving that matters (income, investment profits)
  if (t.txn_class === 'income' || t.txn_class === 'investment_in') return 'amt-income';
  // Neutral/muted: internal moves (transfers, cc payments, savings, investments out, ignore)
  if (['internal_transfer','cc_payment','ignore','savings_in','savings_out','investment_out'].includes(t.txn_class)) return 'amt-neutral';
  // Default: expense/subscription = white
  return 'amt-expense';
}

// ══════════════════════════════════════════════
// SPENDING BREAKDOWN
// ══════════════════════════════════════════════
function SpendingBreakdown({cats, total, allCategories, dynEntries}) {
  const [filterKey, setFilterKey] = useState('');
  const dropdownOptions = useMemo(()=>{
    const opts = [{value:'', label:'— All spending —'}];
    if (!allCategories || allCategories.length===0) return opts;
    const childrenOf = {};allCategories.forEach(c=>{if(c.parent_id){if(!childrenOf[c.parent_id])childrenOf[c.parent_id]=[];childrenOf[c.parent_id].push(c);}});
    const dynByType = {};(dynEntries||[]).forEach(e=>{if(!dynByType[e.entry_type])dynByType[e.entry_type]=[];dynByType[e.entry_type].push(e);});
    const SPENDING_L1 = new Set(['exp','sub','inc','inv_in','inv_out','sav_in','sav_out']);
    function walk(cats, depth) {(cats||[]).sort((a,b)=>a.name.localeCompare(b.name)).forEach(c=>{const pad='  '.repeat(depth*2);const arrow=depth===0?'':depth===1?'› ':'· ';opts.push({value:'cat:'+c.id, label:pad+arrow+c.name, color:c.color});if(c.is_dynamic_parent&&c.entry_type){(dynByType[c.entry_type]||[]).sort((a,b)=>a.name.localeCompare(b.name)).forEach(e=>{const epad='  '.repeat((depth+1)*2);opts.push({value:'dyn:'+e.id, label:epad+'· '+e.name});});}if(childrenOf[c.id])walk(childrenOf[c.id],depth+1);});}
    const l1cats = allCategories.filter(c=>c.level===1&&SPENDING_L1.has(c.id));walk(l1cats, 0);return opts;
  },[allCategories, dynEntries]);
  const descendantMap = useMemo(()=>{const m={};if(!allCategories)return m;const childrenOf={};allCategories.forEach(c=>{if(c.parent_id){if(!childrenOf[c.parent_id])childrenOf[c.parent_id]=[];childrenOf[c.parent_id].push(c.id);}});function getDesc(id){const kids=childrenOf[id]||[];let all=[...kids];kids.forEach(k=>{all=all.concat(getDesc(k));});return all;}allCategories.forEach(c=>{m[c.id]=new Set([c.id,...getDesc(c.id)]);});return m;},[allCategories]);
  const rows = useMemo(()=>{if(!cats||cats.length===0)return[];if(!filterKey)return cats;if(filterKey.startsWith('cat:')){const id=filterKey.slice(4);const desc=descendantMap[id]||new Set([id]);return cats.filter(c=>desc.has(c.l1_id)||desc.has(c.l2_id)||desc.has(c.l3_id));}if(filterKey.startsWith('dyn:')){const id=filterKey.slice(4);return cats.filter(c=>c.l4_id===id||c.l5_id===id);}return cats;},[cats,filterKey,descendantMap]);
  const viewTotal = rows.reduce((s,r)=>s+r.total,0);const baseTotal = total||viewTotal||1;
  if(!cats||cats.length===0) return html`<div className="empty">No categorized spending yet</div>`;
  return html`<div>
    <div style=${{padding:'8px 12px',borderBottom:'1px solid var(--ln)',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
      <select style=${{flex:1,minWidth:'120px',background:filterKey?'var(--bd)':'var(--s2)',border:'1px solid '+(filterKey?'var(--bb)':'var(--ln2)'),color:filterKey?'var(--t1)':'var(--t2)',fontFamily:'var(--mono)',fontSize:'11px',padding:'5px 8px',borderRadius:'var(--r)',outline:'none',cursor:'pointer'}} value=${filterKey} onChange=${e=>setFilterKey(e.target.value)}>
        ${dropdownOptions.map((o,i)=>html`<option key=${i} value=${o.value}>${o.label}</option>`)}
      </select>
      ${filterKey&&html`<button className="clr-btn" onClick=${()=>setFilterKey('')}>clear</button>`}
      ${filterKey&&html`<span style=${{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t3)',whiteSpace:'nowrap'}}>${fmt(viewTotal)}</span>`}
    </div>
    ${rows.length===0?html`<div className="empty">No spending in this category</div>`:rows.slice(0,25).map((c,i)=>html`
      <div key=${i} className="spend-row">
        <div className="spend-dot" style=${{background:c.color||'var(--t3)'}}/>
        <div className="spend-name"><span style=${{fontWeight:'500'}}>${c.l1_name}</span>${c.l2_name&&c.l2_name!==c.l1_name&&html`<span className="spend-sub"> › ${c.l2_name}</span>`}${c.l3_name&&html`<span className="spend-sub"> › ${c.l3_name}</span>`}</div>
        <div className="spend-bar-wrap"><div className="spend-bar" style=${{width:Math.max(Math.round((c.total/baseTotal)*100),1)+'%',background:c.color||'var(--blue)'}}/></div>
        <div className="spend-amt">${fmt(c.total)}</div>
        <div className="spend-pct">${baseTotal>0?Math.round(c.total/baseTotal*100):0}%</div>
      </div>`)}
    ${rows.length>25&&html`<div style=${{padding:'8px 14px',fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t3)',borderTop:'1px solid var(--ln)'}}>+${rows.length-25} more</div>`}
  </div>`;
}

      <div className="kpi c"><div className="kpi-label">Subscriptions</div><div className="kpi-val c">${fmt(s.subscription_total)}</div><div className="kpi-sub">${s.subscription_count} charged</div></div>
      <div className="kpi r"><div className="kpi-label">Credit Balance</div><div className="kpi-val r">${fmt(s.credit_debt)}</div><div className="kpi-sub">Cash: ${fmt(s.cash_on_hand)}</div></div>
    </div>
    <div className="two-col">
      <div className="panel"><div className="ph"><span className="ph-title">12-Month Trend</span></div>
        <div className="trend-wrap">${!trend?html`<div className="loading" style=${{padding:'20px 0'}}>···</div>`:html`
          <div className="trend-bars">${trend.map(r=>html`<div key=${r.label} className="trend-month"><div className="trend-bar-wrap"><div className="trend-bar" style=${{height:Math.round((r.income/maxTrend)*64)+'px',background:'var(--green)',opacity:.7}} title=${'Income: '+fmt(r.income)}/><div className="trend-bar" style=${{height:Math.round((r.spending/maxTrend)*64)+'px',background:'var(--red)',opacity:.7}} title=${'Spending: '+fmt(r.spending)}/></div><div className="trend-lbl">${r.label}</div></div>`)}</div>
          <div style=${{display:'flex',gap:'14px',marginTop:'8px'}}><div style=${{display:'flex',alignItems:'center',gap:'5px',fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t3)'}}><div style=${{width:'8px',height:'8px',background:'var(--green)',borderRadius:'2px',opacity:.7}}/>Income</div><div style=${{display:'flex',alignItems:'center',gap:'5px',fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t3)'}}><div style=${{width:'8px',height:'8px',background:'var(--red)',borderRadius:'2px',opacity:.7}}/>Spending</div></div>`}
        </div>
      </div>
      <div className="panel"><div className="ph"><span className="ph-title">Spending Breakdown</span><span className="ph-stat ph-right">${fmt(s.spending)} total</span></div>
        <${SpendingBreakdown} cats=${cats||[]} total=${s.spending} allCategories=${allCategories||[]} dynEntries=${dynEntries||[]}/>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// COLUMN FILTER
// ══════════════════════════════════════════════
function ColFilter({label,options,value,onChange,align='left'}) {
  const [open,setOpen]=useState(false);const ref=useRef(null);
  useEffect(()=>{function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  const active=value&&value.length>0;
  return html`<div ref=${ref} style=${{position:'relative',display:'inline-block'}}>
    <button onClick=${()=>setOpen(p=>!p)} style=${{background:active?'var(--bd)':'none',border:'none',color:active?'var(--blue)':'var(--t3)',fontFamily:'var(--mono)',fontSize:'9px',padding:'2px 4px',borderRadius:'var(--r)',cursor:'pointer',letterSpacing:'.9px',textTransform:'uppercase',display:'flex',alignItems:'center',gap:'3px',whiteSpace:'nowrap'}}>${label} <span style=${{opacity:active?1:.5,fontSize:'8px'}}>${active?'●':'▾'}</span></button>
    ${open&&html`<div style=${{position:'absolute',top:'100%',[align==='right'?'right':'left']:0,zIndex:999,background:'var(--s2)',border:'1px solid var(--ln3)',borderRadius:'var(--r2)',minWidth:'160px',maxHeight:'280px',overflowY:'auto',boxShadow:'0 4px 20px rgba(0,0,0,.5)',padding:'4px'}}>
      <div onClick=${()=>{onChange('');setOpen(false);}} style=${{padding:'5px 8px',fontSize:'10px',fontFamily:'var(--mono)',color:!value?'var(--blue)':'var(--t3)',cursor:'pointer',borderRadius:'var(--r)',background:!value?'var(--bd)':'none',marginBottom:'2px'}}>— All —</div>
      ${options.map((o,i)=>html`<div key=${i} onClick=${()=>{onChange(o.value);setOpen(false);}} style=${{padding:'5px 8px',fontSize:'11px',fontFamily:'var(--mono)',color:value===o.value?'var(--t1)':'var(--t2)',cursor:'pointer',borderRadius:'var(--r)',background:value===o.value?'var(--bd)':'none',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}}><span style=${{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${o.label}</span><span style=${{color:'var(--t4)',fontSize:'9px',flexShrink:0}}>${o.count}</span></div>`)}</div>`}
  </div>`;
}

// ══════════════════════════════════════════════
// TRANSACTIONS PAGE — V4.2
// Fixes: amount coloring, L5 car tagging
// ══════════════════════════════════════════════
function TransactionsPage({accounts,categories,period,year,month,initialFilter,onFilterUsed,onUpdate}) {
  const [colFilters,setColFilters]=useState({cls:'',account:'',owner:'',cat2:'',cat3:'',cat4:'',cat5:''});
  const [search,setSearch]=useState('');const [incompleteOnly,setIncompleteOnly]=useState(false);const [page,setPage]=useState(0);
  function setCF(key,val){setColFilters(prev=>({...prev,[key]:val}));setPage(0);}
  function clearAll(){setColFilters({cls:'',account:'',owner:'',cat2:'',cat3:'',cat4:'',cat5:''});setSearch('');setIncompleteOnly(false);setPage(0);}
  const hasFilters=search||incompleteOnly||Object.values(colFilters).some(v=>v);
  const [localOverrides,setLocalOverrides]=useState({});
  const [savingIds,setSavingIds]=useState(new Set());
  const PAGE_SIZE=50;
  const catMap=useMemo(()=>{const m={};(categories||[]).forEach(c=>{m[c.id]=c;});return m;},[categories]);
  const childrenOf=useMemo(()=>{const m={};(categories||[]).forEach(c=>{if(c.parent_id){if(!m[c.parent_id])m[c.parent_id]=[];m[c.parent_id].push(c);}});return m;},[categories]);
  const {data:dynEntries}=useAPI('/api/dynamic-entries');
  const dynByType=useMemo(()=>{const m={};(dynEntries||[]).forEach(e=>{if(!m[e.entry_type])m[e.entry_type]=[];m[e.entry_type].push(e);});return m;},[dynEntries]);

  useEffect(()=>{if(initialFilter==='uncat'){setIncompleteOnly(true);onFilterUsed&&onFilterUsed();}},[initialFilter]);

  const dateParam=period==='year'?`&date_from=${year}-01-01&date_to=${year}-12-31`:`&date_from=${year}-${String(month).padStart(2,'0')}-01&date_to=${year}-${String(month).padStart(2,'0')}-${new Date(year,month,0).getDate()}`;
  const txnPath=`/api/transactions?limit=2000${dateParam}`;
  const {data:allTxns,loading,reload}=useAPI(txnPath,[txnPath]);
  const txns=useMemo(()=>(allTxns||[]).map(t=>localOverrides[t.id]?{...t,...localOverrides[t.id]}:t),[allTxns,localOverrides]);

  // V4.2: Find dynamic entry type from ANY ancestor in the chain
  function findDynEntryType(catId) {
    if (!catId) return null;
    const cat = catMap[catId];
    if (!cat) return null;
    if (cat.is_dynamic_parent && cat.entry_type) return cat.entry_type;
    // Walk up the tree
    if (cat.parent_id) return findDynEntryType(cat.parent_id);
    return null;
  }

  function isIncomplete(t) {
    if (!t.cat_l2 || t.cat_l2==='') return true;
    if (t.cat_l2==='na') return false;
    const l3avail=childrenOf[t.cat_l2]||[];
    if (l3avail.length>0&&!t.cat_l3) return true;
    if (!t.cat_l3) return false;
    const l4avail=childrenOf[t.cat_l3]||[];
    const cat3=catMap[t.cat_l3];
    const hasDynL4=cat3&&cat3.is_dynamic_parent&&cat3.entry_type;
    if ((l4avail.length>0||hasDynL4)&&!t.cat_l4) return true;
    if (!t.cat_l4) return false;
    const cat4=catMap[t.cat_l4];
    if (cat4&&cat4.is_dynamic_parent&&cat4.entry_type&&!t.cat_l5) return true;
    // V4.2: Also check if any ancestor is dynamic parent and L5 not set
    const dynType = findDynEntryType(t.cat_l2) || findDynEntryType(t.cat_l3);
    if (dynType && !t.cat_l5 && (dynByType[dynType]||[]).length > 0) return true;
    return false;
  }

  const filtered=useMemo(()=>{
    let t=txns;
    if(search){const q=search.toLowerCase();t=t.filter(x=>(x.description||'').toLowerCase().includes(q)||(x.merchant_clean||'').toLowerCase().includes(q)||(x.counterparty||'').toLowerCase().includes(q));}
    if(colFilters.cls)t=t.filter(x=>x.txn_class===colFilters.cls);
    if(colFilters.account)t=t.filter(x=>x.account_last4===colFilters.account);
    if(colFilters.owner)t=t.filter(x=>x.owner===colFilters.owner);
    if(colFilters.cat2)t=t.filter(x=>x.cat_l2===colFilters.cat2);
    if(colFilters.cat3)t=t.filter(x=>x.cat_l3===colFilters.cat3);
    if(colFilters.cat4)t=t.filter(x=>x.cat_l4===colFilters.cat4);
    if(colFilters.cat5)t=t.filter(x=>x.cat_l5===colFilters.cat5);
    if(incompleteOnly)t=t.filter(x=>isIncomplete(x));
    return t;
  },[txns,search,colFilters,incompleteOnly]);

  const colOpts=useMemo(()=>{
    const count=(arr,key)=>{const m={};arr.forEach(t=>{const v=t[key];if(v){m[v]=(m[v]||0)+1;}});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([v,c])=>({value:v,label:v,count:c}));};
    const countCat=(arr,key)=>{const m={};arr.forEach(t=>{const v=t[key];if(v&&v!=='na'){m[v]=(m[v]||0)+1;}});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([v,c])=>({value:v,label:(catMap[v]?.name||v),count:c}));};
    const countDyn=(arr)=>{const m={};arr.forEach(t=>{const v=t.cat_l5;if(v){m[v]=(m[v]||0)+1;}});const dynMap={};(dynEntries||[]).forEach(e=>{dynMap[e.id]=e.name;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([v,c])=>({value:v,label:(dynMap[v]||v),count:c}));};
    const clsOpts=TXN_CLASSES.map(c=>({value:c.v,label:c.label,count:txns.filter(t=>t.txn_class===c.v).length})).filter(o=>o.count>0);
    return {cls:clsOpts,account:count(txns,'account_last4').map(o=>({...o,label:'···'+o.label})),owner:count(txns,'owner'),cat2:countCat(txns,'cat_l2'),cat3:countCat(txns,'cat_l3'),cat4:countCat(txns,'cat_l4'),cat5:countDyn(txns)};
  },[txns,catMap,dynEntries]);

  const paged=filtered.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);const pages=Math.ceil(filtered.length/PAGE_SIZE);

  async function patchTxn(id,changes) {
    const full={...(localOverrides[id]||{}),...changes};
    if('txn_class' in changes){full.cat_l1=L1MAP[changes.txn_class]||null;full.cat_l2=null;full.cat_l3=null;full.cat_l4=null;full.cat_l5=null;}
    if('cat_l2' in changes&&!('txn_class' in changes)){full.cat_l3=null;full.cat_l4=null;full.cat_l5=null;}
    if('cat_l3' in changes&&!('txn_class' in changes)){full.cat_l4=null;full.cat_l5=null;}
    if('cat_l4' in changes&&!('txn_class' in changes)){full.cat_l5=null;}
    full.user_verified=true;
    setLocalOverrides(prev=>({...prev,[id]:full}));setSavingIds(prev=>new Set(prev).add(id));
    try{await apiFetch(`/api/transactions/${id}`,{method:'PATCH',body:changes});onUpdate&&onUpdate();}
    catch(e){setLocalOverrides(prev=>{const n={...prev};delete n[id];return n;});alert('Save failed: '+e.message);}
    finally{setSavingIds(prev=>{const n=new Set(prev);n.delete(id);return n;});}
  }

  const rowCls=t=>{if(savingIds.has(t.id))return'tr-saving';if(t.txn_class==='income')return'tr-inc';if(['internal_transfer','cc_payment'].includes(t.txn_class))return'tr-xfer';if(t.txn_class==='ignore')return'tr-ign';return'';};

  function l2opts(txn_class){const l1id=L1MAP[txn_class];if(l1id)return childrenOf[l1id]||[];return(categories||[]).filter(c=>c.level===2);}
  function l3opts(l2id){return childrenOf[l2id]||[];}
  function l4opts(l3id){return childrenOf[l3id]||[];}

  // V4.2: L5 options — check the whole ancestor chain for dynamic parent
  function l5opts(t) {
    // Check cat_l4, cat_l3, cat_l2 for dynamic parent flag
    for (const catId of [t.cat_l4, t.cat_l3, t.cat_l2]) {
      if (!catId) continue;
      const dynType = findDynEntryType(catId);
      if (dynType) return dynByType[dynType] || [];
    }
    return [];
  }

  return html`<div style=${{display:'flex',flexDirection:'column',gap:'12px'}}>
    <div><div className="sec-lbl">Account</div>
      <div className="acct-strip">
        <div className=${`ap all ${!colFilters.account?'sel':''}`} onClick=${()=>setCF('account','')}><div className="ap-name">All</div><div className="ap-inst">${(accounts||[]).length} linked</div></div>
        ${(accounts||[]).map(a=>{
          // V4.2: Credit cards show ledger (what you owe), others show available
          const isCredit = a.type==='credit';
          const primaryBal = isCredit ? a.balance_ledger : (a.balance_available ?? a.balance_ledger);
          const secondaryBal = isCredit ? a.balance_available : (a.balance_ledger !== a.balance_available ? a.balance_ledger : null);
          const secondaryLabel = isCredit ? 'avail' : 'posted';
          return html`<div key=${a.id} className=${`ap ${colFilters.account===a.last_four?'sel':''}`} onClick=${()=>setCF('account',colFilters.account===a.last_four?'':a.last_four)}>
            <div className="ap-name">${shortName(a.name)}</div>
            <div className="ap-inst">${a.institution} ···${a.last_four}</div>
            ${primaryBal!=null?html`<div className=${`ap-bal ${isCredit?'crd':a.is_savings?'sav':'chk'}`}>${fmt(Math.abs(primaryBal))}</div>`:null}
            ${secondaryBal!=null&&secondaryBal!==primaryBal?html`<div style=${{fontSize:'9px',color:'var(--t3)',fontFamily:'var(--mono)'}}>${secondaryLabel} ${fmt(Math.abs(secondaryBal))}</div>`:null}
            <div style=${{display:'flex',gap:'3px',flexWrap:'wrap'}}><${OB} owner=${a.owner}/>${a.exclude_from_savings&&html`<span className="badge b-exp">bills</span>`}</div>
          </div>`;})}
      </div>
    </div>
    <div className="panel">
      <div className="fbar">
        <div className="sw"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="m11 11 3 3"/></svg><input className="si" placeholder="Search..." value=${search} onInput=${e=>{setSearch(e.target.value);setPage(0);}}/></div>
        <button className=${`fp ${incompleteOnly?'on':''}`} onClick=${()=>setIncompleteOnly(p=>!p)}>${incompleteOnly?'✓ ':''}Incomplete</button>
        ${hasFilters&&html`<button className="clr-btn" onClick=${clearAll}>clear all</button>`}
        <span className="cbadge">${filtered.length.toLocaleString()} / ${txns.length.toLocaleString()}</span>
      </div>
      ${loading?html`<div className="loading">Loading transactions...</div>`:paged.length===0?html`<div className="empty">No transactions match filters</div>`:html`
        <div className="tw"><table><thead><tr>
          <th>Date</th><th>Merchant</th>
          <th><${ColFilter} label="Account" options=${colOpts.account} value=${colFilters.account} onChange=${v=>setCF('account',v)}/></th>
          <th style=${{textAlign:'right'}}>Amount</th>
          <th className="col-sep"><${ColFilter} label="Classification" options=${colOpts.cls} value=${colFilters.cls} onChange=${v=>setCF('cls',v)}/></th>
          <th className="col-sep"><${ColFilter} label="Category" options=${colOpts.cat2} value=${colFilters.cat2} onChange=${v=>setCF('cat2',v)}/></th>
          <th><${ColFilter} label="Sub" options=${colOpts.cat3} value=${colFilters.cat3} onChange=${v=>setCF('cat3',v)}/></th>
          <th><${ColFilter} label="Detail" options=${colOpts.cat4} value=${colFilters.cat4} onChange=${v=>setCF('cat4',v)}/></th>
          <th><${ColFilter} label="Tag" options=${colOpts.cat5} value=${colFilters.cat5} onChange=${v=>setCF('cat5',v)}/></th>
        </tr></thead><tbody>
          ${paged.map(t=>{
            const l2=l2opts(t.txn_class);const l3=l3opts(t.cat_l2||'');const l4=l4opts(t.cat_l3||'');const l5=l5opts(t);
            return html`<tr key=${t.id} className=${rowCls(t)}>
              <td className="td-date">${fmtD(t.date)}</td>
              <td><div className="td-m" title=${t.description}>${t.merchant_clean||t.counterparty||t.description}${t.user_verified&&html`<span className="vdot" title="Verified"/>`}</div>${(t.merchant_clean||t.counterparty)&&html`<div className="td-raw">${t.description.substring(0,45)}</div>`}</td>
              <td><div style=${{fontSize:'11px',fontFamily:'var(--mono)',color:'var(--t2)'}}>···${t.account_last4}</div><${OB} owner=${t.owner}/></td>
              <td><div className=${`td-amt ${amtCls(t)}`}>${fmt(t.amount)}</div>${t.status==='pending'&&html`<div style=${{fontSize:'9px',color:'var(--amber)',fontFamily:'var(--mono)',textAlign:'right'}}>pending</div>`}</td>
              <td className="col-sep" style=${{minWidth:'130px'}}><div className="td-pills"><${CB} cls=${t.txn_class}/></div>
                <select className=${`isel ${t.txn_class||''}`} value=${t.txn_class||''} onChange=${e=>patchTxn(t.id,{txn_class:e.target.value})}><option value="">— type —</option>${TXN_CLASSES.map(c=>html`<option key=${c.v} value=${c.v}>${c.label}</option>`)}</select></td>
              <td className="col-sep" style=${{minWidth:'130px'}}>
                <select className=${`isel ${t.cat_l2?'set':''}`} value=${t.cat_l2||''} onChange=${e=>patchTxn(t.id,{cat_l2:e.target.value})}><option value="">— category —</option><option value="na">N/A</option>${l2.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}</select></td>
              <td style=${{minWidth:'120px'}}>${t.cat_l2&&l3.length>0&&html`<select className=${`isel ${t.cat_l3?'set':''}`} value=${t.cat_l3||''} onChange=${e=>patchTxn(t.id,{cat_l3:e.target.value})}><option value="">— sub —</option>${l3.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}</select>`}</td>
              <td style=${{minWidth:'120px'}}>${t.cat_l3&&l4.length>0&&html`<select className=${`isel ${t.cat_l4?'set':''}`} value=${t.cat_l4||''} onChange=${e=>patchTxn(t.id,{cat_l4:e.target.value})}><option value="">— detail —</option>${l4.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}</select>`}</td>
              <td style=${{minWidth:'120px'}}>${l5.length>0&&html`<select className=${`isel trip-sel ${t.cat_l5?'set':''}`} value=${t.cat_l5||''} onChange=${e=>patchTxn(t.id,{cat_l5:e.target.value})}><option value="">— tag —</option>${l5.map(e=>html`<option key=${e.id} value=${e.id}>${e.name}</option>`)}</select>`}</td>
            </tr>`;})}
        </tbody></table></div>
        <div className="pager"><button className="pg-btn" onClick=${()=>setPage(p=>p-1)} disabled=${page===0}>← prev</button><span className="pg-info">page ${page+1} / ${Math.max(1,pages)} · ${filtered.length.toLocaleString()} results</span><button className="pg-btn" onClick=${()=>setPage(p=>p+1)} disabled=${page>=pages-1}>next →</button></div>`}
    </div>
  </div>`;
}

function CategoriesPage({categories,onUpdate}) {
  const [expanded,setExpanded]=useState({});const [addParent,setAddParent]=useState(null);const [form,setForm]=useState({name:'',color:'#3d9eff',budget_amount:'',_editId:null});const [saving,setSaving]=useState(false);const [err,setErr]=useState('');
  const {data:dynEntries,reload:reloadDyn}=useAPI('/api/dynamic-entries');const [dynForm,setDynForm]=useState({type:'car',name:''});const [showAddDyn,setShowAddDyn]=useState(false);
  const l1cats=(categories||[]).filter(c=>c.level===1);const childrenOf=useMemo(()=>{const m={};(categories||[]).forEach(c=>{if(c.parent_id){if(!m[c.parent_id])m[c.parent_id]=[];m[c.parent_id].push(c);}});return m;},[categories]);
  const toggle=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  const resetForm=()=>{setAddParent(null);setForm({name:'',color:'#3d9eff',budget_amount:'',_editId:null});setErr('');};
  async function saveCategory(){if(!form.name.trim()){setErr('Name required');return;}setSaving(true);setErr('');try{if(form._editId){await apiFetch(`/api/categories/${form._editId}`,{method:'PATCH',body:{name:form.name.trim(),color:form.color,budget_amount:form.budget_amount?parseFloat(form.budget_amount):null}});}else{await apiFetch('/api/categories',{method:'POST',body:{name:form.name.trim(),color:form.color,parent_id:addParent==='root'?null:addParent,budget_amount:form.budget_amount?parseFloat(form.budget_amount):null}});}resetForm();onUpdate&&onUpdate();}catch(e){setErr(e.message);}finally{setSaving(false);}}
  async function delCategory(id){if(!confirm('Delete category?'))return;try{await apiFetch(`/api/categories/${id}`,{method:'DELETE'});onUpdate&&onUpdate();}catch(e){alert(e.message);}}
  async function addDynEntry(){if(!dynForm.name.trim())return;try{await apiFetch('/api/dynamic-entries',{method:'POST',body:{entry_type:dynForm.type,name:dynForm.name.trim()}});setDynForm({type:'car',name:''});setShowAddDyn(false);reloadDyn();}catch(e){alert(e.message);}}
  async function delDynEntry(id){if(!confirm('Remove this entry?'))return;try{await apiFetch(`/api/dynamic-entries/${id}`,{method:'DELETE'});reloadDyn();}catch(e){alert(e.message);}}
  const renderTree=(cats,depth=0)=>cats.map(c=>html`<div key=${c.id}>
    <div className=${`cat-row l${Math.min(c.level,2)}`} onClick=${()=>toggle(c.id)} style=${{paddingLeft:`${8+depth*16}px`}}>
      <span style=${{fontSize:'11px',color:'var(--t3)',fontFamily:'var(--mono)',width:'12px'}}>${(childrenOf[c.id]||[]).length>0?(expanded[c.id]?'▾':'▸'):''}</span>
      <div className="cat-dot" style=${{background:c.color||'var(--t3)'}}/><span className="cat-name" style=${{fontSize:c.level===1?'13px':'12px'}}>${c.name}</span>
      ${c.is_system&&html`<span style=${{fontSize:'9px',color:'var(--t4)',fontFamily:'var(--mono)'}}>sys</span>`}
      ${c.is_dynamic_parent&&html`<span style=${{fontSize:'9px',color:'var(--purple)',fontFamily:'var(--mono)'}}>+${c.entry_type}s</span>`}
      ${c.budget_amount&&html`<span className="cat-bud">${fmt(c.budget_amount)}/mo</span>`}
      <div className="cat-acts" onClick=${e=>e.stopPropagation()}>
        <button className="icon-btn" onClick=${()=>{setForm({name:c.name,color:c.color||'#3d9eff',budget_amount:c.budget_amount||'',_editId:c.id});setAddParent(c.id);}}>edit</button>
        <button className="icon-btn" onClick=${()=>{setAddParent(c.id);setForm({name:'',color:c.color||'#3d9eff',budget_amount:'',_editId:null});}}>+ sub</button>
        ${!c.is_system&&html`<button className="icon-btn del" onClick=${()=>delCategory(c.id)}>del</button>`}
      </div>
    </div>
    ${addParent===c.id&&html`<${CategoryAddForm} form=${form} setForm=${setForm} onSave=${saveCategory} onCancel=${resetForm} saving=${saving} err=${err}/>`}
    ${expanded[c.id]&&(childrenOf[c.id]||[]).length>0&&html`<div>${renderTree(childrenOf[c.id]||[],depth+1)}</div>`}
  </div>`);
  const dynByType=useMemo(()=>{const m={};(dynEntries||[]).forEach(e=>{if(!m[e.entry_type])m[e.entry_type]=[];m[e.entry_type].push(e);});return m;},[dynEntries]);
  return html`<div style=${{display:'flex',flexDirection:'column',gap:'14px'}}>

        <div style=${{padding:'8px'}}>${addParent==='root'&&html`<${CategoryAddForm} form=${form} setForm=${setForm} onSave=${saveCategory} onCancel=${resetForm} saving=${saving} err=${err}/>`}${renderTree(l1cats)}</div>

          ${showAddDyn===type&&html`<div style=${{padding:'10px',borderBottom:'1px solid var(--ln)',background:'var(--s2)'}}><div className="form-row"><div className="fg" style=${{flex:1}}><label className="fl">Name</label><input className="fi" autoFocus placeholder=${type==='car'?'e.g. Tacoma':type==='project'?'e.g. Kitchen Remodel':'e.g. Vegas 2026'} value=${dynForm.name} onInput=${e=>setDynForm(f=>({...f,name:e.target.value,type}))} onKeyDown=${e=>e.key==='Enter'&&addDynEntry()} style=${{width:'100%'}}/></div><button className="btn btn-s" onClick=${()=>{setDynForm(f=>({...f,type}));addDynEntry();}}>+ add</button><button className="btn btn-g" onClick=${()=>setShowAddDyn(false)}>cancel</button></div></div>`}
          <div>${(dynByType[type]||[]).length===0?html`<div className="empty" style=${{padding:'16px'}}>No ${type}s yet</div>`:(dynByType[type]||[]).map(e=>html`<div key=${e.id} className="entry-row"><div className="entry-type-dot" style=${{background:type==='car'?'var(--amber)':type==='project'?'var(--blue)':'var(--green)'}}/><span className="entry-name">${e.name}</span><button className="icon-btn del" onClick=${()=>delDynEntry(e.id)}>remove</button></div>`)}</div>
        </div>`)}
      </div>
    </div>
  </div>`;
}

const EMPTY_RULE_FORM={match_type:'description_contains',match_value:'',txn_class:'expense',cat_l2:'',cat_l3:'',cat_l4:'',cat_l5:'',recurring_type:'',merchant_clean:'',apply_to_existing:false,priority:100,_editId:null};

  const formL5opts=useMemo(()=>{const cat=catMap[form.cat_l4];if(!cat||!cat.is_dynamic_parent||!cat.entry_type)return[];return dynByType[cat.entry_type]||[];},[form.cat_l4,catMap,dynByType]);
  const filtered=rules.filter(r=>!search||r.match_value.toLowerCase().includes(search.toLowerCase())||(r.merchant_clean||'').toLowerCase().includes(search.toLowerCase()));
  const openAdd=()=>{setForm({...EMPTY_RULE_FORM});setShowForm(true);setErr('');setTimeout(()=>matchInputRef.current?.focus(),50);};
  const openEdit=(r)=>{setForm({match_type:r.match_type,match_value:r.match_value,txn_class:r.txn_class||'expense',cat_l2:r.cat_l2||'',cat_l3:r.cat_l3||'',cat_l4:r.cat_l4||'',cat_l5:r.cat_l5||'',recurring_type:r.recurring_type||'',merchant_clean:r.merchant_clean||'',apply_to_existing:false,priority:r.priority||100,_editId:r.id});setShowForm(true);setErr('');setTimeout(()=>matchInputRef.current?.focus(),50);};
  const cancelForm=()=>{setShowForm(false);setForm({...EMPTY_RULE_FORM});setErr('');};
  async function submitRule(){if(!form.match_value.trim()){setErr('Match value required');return;}setSaving(true);setErr('');const payload={match_type:form.match_type,match_value:form.match_value,txn_class:form.txn_class||null,cat_l2:form.cat_l2||null,cat_l3:form.cat_l3||null,cat_l4:form.cat_l4||null,cat_l5:form.cat_l5||null,recurring_type:form.recurring_type||null,merchant_clean:form.merchant_clean||null,apply_to_existing:form.apply_to_existing,priority:form.priority};
    try{if(form._editId){await apiFetch(`/api/rules/${form._editId}`,{method:'PATCH',body:{...payload,is_active:true}});}else{await apiFetch('/api/rules',{method:'POST',body:payload});}cancelForm();reload();}catch(e){setErr(e.message);}finally{setSaving(false);}}

      <div className="ph"><span className="ph-title">Merchant Rules</span><span className="ph-stat">${rules.filter(r=>r.is_system).length} system · ${rules.filter(r=>!r.is_system).length} user</span>

        <div style=${{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t3)',marginBottom:'10px',textTransform:'uppercase',letterSpacing:'1px'}}>${form._editId?'Edit rule':'New rule'}</div>

        </div>
        <div className="form-row" style=${{marginTop:'8px'}}>
          <div className="fg"><label className="fl">Classification</label><select className="fs" value=${form.txn_class} onChange=${e=>setForm(f=>({...f,txn_class:e.target.value,cat_l2:'',cat_l3:'',cat_l4:'',cat_l5:''}))}><option value="">— none —</option>${TXN_CLASSES.map(c=>html`<option key=${c.v} value=${c.v}>${c.label}</option>`)}</select></div>
          <div className="fg"><label className="fl">Recurring type</label><select className="fs" value=${form.recurring_type} onChange=${e=>setForm(f=>({...f,recurring_type:e.target.value}))}><option value="">— none —</option>${RECURRING_TYPES.map(r=>html`<option key=${r.v} value=${r.v}>${r.label}</option>`)}</select></div>
        </div>
        <div className="form-row" style=${{marginTop:'8px'}}>
          ${formL2opts.length>0&&html`<div className="fg"><label className="fl">Category</label><select className="fs" value=${form.cat_l2} onChange=${e=>setForm(f=>({...f,cat_l2:e.target.value,cat_l3:'',cat_l4:'',cat_l5:''}))}><option value="">— L2 —</option>${formL2opts.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}</select></div>`}
          ${form.cat_l2&&formL3opts.length>0&&html`<div className="fg"><label className="fl">Sub</label><select className="fs" value=${form.cat_l3} onChange=${e=>setForm(f=>({...f,cat_l3:e.target.value,cat_l4:'',cat_l5:''}))}><option value="">— L3 —</option>${formL3opts.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}</select></div>`}
          ${form.cat_l3&&formL4opts.length>0&&html`<div className="fg"><label className="fl">Detail</label><select className="fs" value=${form.cat_l4} onChange=${e=>setForm(f=>({...f,cat_l4:e.target.value,cat_l5:''}))}><option value="">— L4 —</option>${formL4opts.map(c=>html`<option key=${c.id} value=${c.id}>${c.name}</option>`)}</select></div>`}
          ${form.cat_l4&&formL5opts.length>0&&html`<div className="fg"><label className="fl">Tag</label><select className="fs" value=${form.cat_l5} onChange=${e=>setForm(f=>({...f,cat_l5:e.target.value}))}><option value="">— tag —</option>${formL5opts.map(e=>html`<option key=${e.id} value=${e.id}>${e.name}</option>`)}</select></div>`}
        </div>
        <div className="form-row" style=${{marginTop:'8px'}}>
          <label style=${{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',color:'var(--t2)',cursor:'pointer'}}><input type="checkbox" checked=${form.apply_to_existing} onChange=${e=>setForm(f=>({...f,apply_to_existing:e.target.checked}))}/>Apply to existing</label>
          <button className="btn btn-s" onClick=${submitRule} disabled=${saving}>${saving?'saving…':form._editId?'save changes':'+ add rule'}</button>
          <button className="btn btn-g" onClick=${cancelForm}>cancel</button>
        </div>${err&&html`<div className="err">${err}</div>`}
      </div>`}
      <div>${filtered.map(r=>html`<div key=${r.id} className="rule-row" style=${{opacity:r.is_active?1:.4}}>
        <div className="rule-match"><span style=${{color:'var(--t3)',fontSize:'9px'}}>${r.match_type} </span><span className="rule-val">"${r.match_value}"</span>${r.merchant_clean&&html`<span style=${{color:'var(--t2)',fontSize:'10px'}}> → ${r.merchant_clean}</span>`}</div>
        <div className="rule-pills">${r.txn_class&&html`<span className="rp cls">${r.txn_class}</span>`}${r.cat_l2&&catMap[r.cat_l2]&&html`<span className="rp cat">${catMap[r.cat_l2].name}</span>`}${r.cat_l3&&catMap[r.cat_l3]&&html`<span className="rp cat">${catMap[r.cat_l3].name}</span>`}${r.cat_l4&&catMap[r.cat_l4]&&html`<span className="rp cat">${catMap[r.cat_l4].name}</span>`}${r.recurring_type&&html`<span className="rp rec">${r.recurring_type}</span>`}</div>
        <span className="rule-cnt">${(r.match_count||0).toLocaleString()} hits</span>${r.is_system&&html`<span className="sys-tag">sys</span>`}
        <div style=${{display:'flex',gap:'3px',flexShrink:0}}><button className=${`icon-btn ${form._editId===r.id&&showForm?'edit-active':''}`} onClick=${()=>form._editId===r.id&&showForm?cancelForm():openEdit(r)}>${form._editId===r.id&&showForm?'cancel':'edit'}</button><button className="icon-btn" onClick=${()=>toggleActive(r)}>${r.is_active?'disable':'enable'}</button>${!r.is_system&&html`<button className="icon-btn del" onClick=${()=>delRule(r.id)}>del</button>`}</div>
      </div>`)}</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// ACCOUNTS PAGE — V4.2: credit card balance fix
// ══════════════════════════════════════════════
function AccountsPage({accounts,onRefresh,refreshing}) {
  const checking=(accounts||[]).filter(a=>a.type==='depository'&&!a.is_savings&&!a.is_bills_only&&!a.exclude_from_savings);
  const savings=(accounts||[]).filter(a=>a.is_savings&&!a.exclude_from_savings);
  const bills=(accounts||[]).filter(a=>a.exclude_from_savings||a.is_bills_only);
  const credit=(accounts||[]).filter(a=>a.type==='credit');
  // V4.2: checking/savings use available, credit uses ledger (what you owe)
  const totChk=checking.reduce((s,a)=>s+(a.balance_available??a.balance_ledger??0),0);
  const totSav=savings.reduce((s,a)=>s+(a.balance_available??a.balance_ledger??0),0);
  const totDebt=credit.reduce((s,a)=>s+Math.abs(a.balance_ledger||0),0);
  const netLiq=totChk+totSav-totDebt;

  const Group=({title,accts,colorVar})=>html`<div className="panel"><div className="ph"><span className="ph-title">${title}</span><span style=${{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:'13px',color:`var(${colorVar})`}}>${fmt(accts.reduce((s,a)=>s+Math.abs(a.balance_ledger||0),0))}</span></div>
    <div>${accts.map(a=>{
      const isCredit=a.type==='credit';
      const primary=isCredit?a.balance_ledger:(a.balance_available??a.balance_ledger);
      const secondary=isCredit?a.balance_available:(a.balance_ledger!==a.balance_available?a.balance_ledger:null);
      const secLabel=isCredit?'available':'posted';
      return html`<div key=${a.id} style=${{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',borderBottom:'1px solid var(--ln)'}}>
        <div style=${{flex:1}}><div style=${{fontSize:'13px',fontWeight:'500'}}>${shortName(a.name)}</div><div style=${{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t2)',marginTop:'1px'}}>${a.institution} ···${a.last_four}</div></div>
        <${OB} owner=${a.owner}/>${a.exclude_from_savings&&html`<span className="badge b-exp" style=${{fontSize:'9px'}}>bills only</span>`}
        <div style=${{textAlign:'right'}}><div style=${{fontFamily:'var(--mono)',fontSize:'14px',fontWeight:'600',color:`var(${colorVar})`}}>${primary!=null?fmt(Math.abs(primary)):'—'}</div>
          ${secondary!=null&&secondary!==primary&&html`<div style=${{fontSize:'10px',color:'var(--t3)',fontFamily:'var(--mono)'}}>${secLabel} ${fmt(Math.abs(secondary))}</div>`}
          ${a.balance_fetched_at&&html`<div style=${{fontSize:'9px',color:'var(--t4)',fontFamily:'var(--mono)'}}>${new Date(a.balance_fetched_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>`}
        </div>
      </div>`})}</div></div>`;

  return html`<div style=${{display:'flex',flexDirection:'column',gap:'14px'}}>
    <div className="kpi-grid">
      <div className="kpi b"><div className="kpi-label">Checking</div><div className="kpi-val b">${fmt(totChk)}</div><div className="kpi-sub">${checking.length} accounts</div></div>
      <div className="kpi g"><div className="kpi-label">True Savings</div><div className="kpi-val g">${fmt(totSav)}</div><div className="kpi-sub">${savings.length} accounts</div></div>
      <div className="kpi r"><div className="kpi-label">Credit Debt</div><div className="kpi-val r">${fmt(totDebt)}</div><div className="kpi-sub">${credit.length} cards</div></div>
      <div className=${`kpi ${netLiq>=0?'g':'r'}`}><div className="kpi-label">Net Liquid</div><div className=${`kpi-val ${netLiq>=0?'g':'r'}`}>${fmt(netLiq)}</div><div className="kpi-sub">Chk + sav − debt</div></div>
    </div>
    <div style=${{display:'flex',justifyContent:'flex-end'}}><button className=${`btn btn-g ${refreshing?'busy':''}`} onClick=${onRefresh} disabled=${refreshing}>${refreshing?html`<span className="spin">↻</span> refreshing…`:'↻ refresh balances'}</button></div>
    <${Group} title="Checking Accounts" accts=${checking} colorVar="--blue"/>
    <${Group} title="True Savings" accts=${savings} colorVar="--green"/>
    <${Group} title="Bills / Mortgage Acct" accts=${bills} colorVar="--amber"/>
    <${Group} title="Credit Cards" accts=${credit} colorVar="--red"/>
  </div>`;
}

// ══════════════════════════════════════════════
// EXTERNAL SYNC PAGE
// ══════════════════════════════════════════════
function ExternalSyncPage() {
  const [appleSession,setAppleSession]=useState(null);const [appleStatus,setAppleStatus]=useState(null);const [apple2fa,setApple2fa]=useState('');const [appleLoading,setAppleLoading]=useState(false);const [appleError,setAppleError]=useState('');
  const [appleDateFrom,setAppleDateFrom]=useState(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;});
  const [appleDateTo,setAppleDateTo]=useState(()=>new Date().toISOString().split('T')[0]);
  const [syncSession,setSyncSession]=useState(null);const [syncStatus,setSyncStatus]=useState(null);const [syncLoading,setSyncLoading]=useState(false);const [syncError,setSyncError]=useState('');const pollRef=useRef(null);
  function stopPolling(){if(pollRef.current){clearInterval(pollRef.current);pollRef.current=null;}}
  useEffect(()=>()=>stopPolling(),[]);
  function startPolling(sid,setSt,setEr,setLd){stopPolling();pollRef.current=setInterval(async()=>{try{const d=await apiFetch(`/api/scrape/status/${sid}`);setSt(d);if(['complete','error','not_implemented'].includes(d.status)){stopPolling();setLd(false);if(d.status==='error')setEr(d.error||'Unknown error');}}catch(e){stopPolling();setLd(false);setEr(e.message);}},2000);}
  async function startApple(){setAppleLoading(true);setAppleError('');setAppleStatus(null);try{const d=await apiFetch('/api/scrape/apple/start',{method:'POST',body:{start_date:appleDateFrom,end_date:appleDateTo,backfill:false}});setAppleSession(d.session_id);startPolling(d.session_id,setAppleStatus,setAppleError,setAppleLoading);}catch(e){setAppleError(e.message);setAppleLoading(false);}}
  async function submitApple2fa(){if(apple2fa.length!==6)return;setAppleError('');try{await apiFetch('/api/scrape/apple/verify',{method:'POST',body:{session_id:appleSession,code:apple2fa}});setApple2fa('');}catch(e){setAppleError(e.message);}}
  async function startSync(){setSyncLoading(true);setSyncError('');setSyncStatus(null);try{const d=await apiFetch('/api/scrape/synchrony/start',{method:'POST',body:{}});setSyncSession(d.session_id);startPolling(d.session_id,setSyncStatus,setSyncError,setSyncLoading);}catch(e){setSyncError(e.message);setSyncLoading(false);}}
  const sColor=s=>{if(!s)return'var(--t3)';if(s==='complete')return'var(--green)';if(s==='error')return'var(--red)';if(s==='awaiting_2fa')return'var(--amber)';return'var(--blue)';};
  const sLabel=s=>{if(!s)return'idle';const m={starting:'Starting...',logging_in:'Logging in...',awaiting_2fa:'Waiting for 2FA code',verifying_2fa:'Verifying code...',authenticated:'Authenticated',scraping_balance:'Scraping balance...',scraping_transactions:'Scraping transactions...',importing:'Importing data...',complete:'Complete',error:'Error',not_implemented:'Not yet implemented'};return m[s]||s;};
  return html`<div style=${{display:'flex',flexDirection:'column',gap:'14px'}}>
    <div className="two-col">
      <div className="panel"><div className="ph"><span className="ph-title">Apple Card</span><span className="ph-stat">Semi-automated · SMS 2FA</span></div>
        <div style=${{padding:'14px',display:'flex',flexDirection:'column',gap:'12px'}}>
          <div className="form-row"><div className="fg"><label className="fl">Start</label><input className="fi" type="date" value=${appleDateFrom} onChange=${e=>setAppleDateFrom(e.target.value)} style=${{width:'160px'}}/></div><div className="fg"><label className="fl">End</label><input className="fi" type="date" value=${appleDateTo} onChange=${e=>setAppleDateTo(e.target.value)} style=${{width:'160px'}}/></div><button className="btn btn-p" onClick=${startApple} disabled=${appleLoading}>${appleLoading?'running...':'Sync Apple Card'}</button></div>
          ${appleStatus&&html`<div style=${{padding:'10px',background:'var(--s2)',border:'1px solid var(--ln2)',borderRadius:'var(--r2)'}}><div style=${{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}><div style=${{width:'8px',height:'8px',borderRadius:'50%',background:sColor(appleStatus.status)}}/><span style=${{fontFamily:'var(--mono)',fontSize:'11px',color:sColor(appleStatus.status)}}>${sLabel(appleStatus.status)}</span></div>${appleStatus.txn_count>0&&html`<div style=${{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--green)'}}>✓ ${appleStatus.txn_count} transactions imported</div>`}</div>`}
          ${appleStatus&&appleStatus.status==='awaiting_2fa'&&html`<div style=${{padding:'12px',background:'var(--ad)',border:'1px solid var(--ab)',borderRadius:'var(--r2)'}}><div style=${{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--amber)',marginBottom:'8px',textTransform:'uppercase'}}>Enter SMS verification code</div><div className="form-row"><input className="fi" placeholder="6-digit code" value=${apple2fa} onInput=${e=>setApple2fa(e.target.value.replace(/\\D/g,'').slice(0,6))} onKeyDown=${e=>e.key==='Enter'&&submitApple2fa()} style=${{width:'140px',fontSize:'18px',fontFamily:'var(--mono)',letterSpacing:'4px',textAlign:'center'}} autoFocus maxLength="6"/><button className="btn btn-s" onClick=${submitApple2fa} disabled=${apple2fa.length!==6}>Submit Code</button></div></div>`}
          ${appleError&&html`<div className="err">${appleError}</div>`}
        </div>
      </div>
      <div className="panel"><div className="ph"><span className="ph-title">Synchrony</span><span className="ph-stat">Automated · runs hourly</span></div>
        <div style=${{padding:'14px',display:'flex',flexDirection:'column',gap:'12px'}}>
          <div style=${{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t3)'}}>Discount Tire (···5339) + Amazon Prime Store Card (···8814)</div>
          <div><button className="btn btn-p" onClick=${startSync} disabled=${syncLoading}>${syncLoading?'running...':'Sync Synchrony'}</button></div>
          ${syncStatus&&html`<div style=${{padding:'10px',background:'var(--s2)',border:'1px solid var(--ln2)',borderRadius:'var(--r2)'}}><div style=${{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}><div style=${{width:'8px',height:'8px',borderRadius:'50%',background:sColor(syncStatus.status)}}/><span style=${{fontFamily:'var(--mono)',fontSize:'11px',color:sColor(syncStatus.status)}}>${sLabel(syncStatus.status)}</span></div>${syncStatus.txn_count>0&&html`<div style=${{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--green)'}}>✓ ${syncStatus.txn_count} transactions imported</div>`}</div>`}
          ${syncError&&html`<div className="err">${syncError}</div>`}
        </div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════
function App() {
  const [tab,setTab]=useState('overview');const [period,setPeriod]=useState('month');const [year,setYear]=useState(CUR_YEAR);const [month,setMonth]=useState(CUR_MONTH);
  const [syncing,setSyncing]=useState(false);const [refreshingBal,setRefBal]=useState(false);const [txnFilter,setTxnFilter]=useState('');const [refreshKey,setRefreshKey]=useState(0);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const {data:accounts,reload:reloadAccts}=useAPI('/api/accounts');const {data:categories,reload:reloadCats}=useAPI('/api/categories');
  const summaryPath=period==='year'?`/api/summary?period=year&year=${year}`:`/api/summary?period=month&year=${year}&month=${month}`;
  const {data:sum,reload:reloadSum}=useAPI(summaryPath,[summaryPath]);const uncatCount=sum?.uncategorized_count||0;
  function reloadAll(){reloadAccts();reloadCats();reloadSum();setRefreshKey(k=>k+1);}
  async function doSync(){setSyncing(true);try{await apiFetch('/api/sync',{method:'POST'});reloadAll();}catch(e){alert('Sync failed: '+e.message);}finally{setSyncing(false);}}
  async function doRefreshBal(){setRefBal(true);try{await apiFetch('/api/balances/refresh',{method:'POST'});reloadAccts();reloadSum();}catch(e){alert(e.message);}finally{setRefBal(false);}}
  const periodLabel=period==='year'?String(year):`${MONTHS[month-1]} ${year}`;
  const years=[];for(let y=CUR_YEAR;y>=2026;y--)years.push(y);
  const NAV=[{id:'overview',label:'Overview',icon:html`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>`},{id:'transactions',label:'Transactions',icon:html`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 4h12M2 8h8M2 12h5"/></svg>`},{id:'accounts',label:'Accounts',icon:html`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M1 7h14"/></svg>`},{id:'categories',label:'Categories',icon:html`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>`},{id:'rules',label:'Rules',icon:html`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="4" cy="4" r="2"/><circle cx="12" cy="12" r="2"/><path d="M4 6v2a2 2 0 0 0 2 2h2a2 2 0 0 1 2 2"/></svg>`},{id:'sync',label:'External Sync',icon:html`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 8a6 6 0 0 1 10.3-4.2M14 8a6 6 0 0 1-10.3 4.2"/><path d="M14 2v4h-4M2 14v-4h4"/></svg>`}];
  const PAGE_TITLES={overview:'Overview',transactions:'Transactions',accounts:'Accounts & Balances',categories:'Category Management',rules:'Merchant Rules',sync:'External Account Sync'};
  function navTo(id){setTab(id);setSidebarOpen(false);}

  return html`<div className="app">
    <!-- Mobile top bar -->
    <div className="mobile-bar">
      <button className="hamburger" onClick=${()=>setSidebarOpen(true)}>☰</button>
      <div className="sb-title">budget<span>.</span>duo</div>
      <span style=${{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:'10px',color:'var(--t3)'}}>${periodLabel}</span>
    </div>
    <!-- Sidebar overlay (mobile) -->
    <div className=${`sidebar-overlay ${sidebarOpen?'open':''}`} onClick=${()=>setSidebarOpen(false)}/>
    <!-- Sidebar -->
    <aside className=${`sidebar ${sidebarOpen?'open':''}`}>
      <div className="sb-brand">
        <div className="sb-logo"><svg viewBox="0 0 16 16"><path d="M8 2L2 6v8h4v-4h4v4h4V6z"/></svg></div>
        <div className="sb-title">budget<span>.</span>duo</div>
        <button className="sb-close" onClick=${()=>setSidebarOpen(false)}>✕</button>
      </div>
      <div className="sb-period"><div className="sb-period-label">Period</div>
        <div className="period-toggle"><button className=${`period-btn ${period==='month'?'on':''}`} onClick=${()=>setPeriod('month')}>Month</button><button className=${`period-btn ${period==='year'?'on':''}`} onClick=${()=>setPeriod('year')}>Year</button></div>
        <div className="period-row"><select className="period-sel" value=${year} onChange=${e=>setYear(Number(e.target.value))}>${years.map(y=>html`<option key=${y} value=${y}>${y}</option>`)}</select>${period==='month'&&html`<select className="period-sel" value=${month} onChange=${e=>setMonth(Number(e.target.value))}>${MONTHS.map((m,i)=>html`<option key=${i+1} value=${i+1}>${m}</option>`)}</select>`}</div>
      </div>
      <div className="sb-sec">Navigation</div>
      ${NAV.map(n=>html`<button key=${n.id} className=${`nav ${tab===n.id?'on':''}`} onClick=${()=>navTo(n.id)}>${n.icon}${n.label}${n.id==='transactions'&&uncatCount>0&&html`<span className="nav-badge">${uncatCount}</span>`}</button>`)}
      <div className="sb-bottom"><button className=${`sync-btn ${syncing?'busy':''}`} onClick=${doSync} disabled=${syncing}><span className=${syncing?'spin':''}>↻</span>${syncing?'syncing…':'sync accounts'}</button></div>
    </aside>
    <!-- Main -->
    <main className="main">
      <div className="topbar"><div><div className="topbar-title">${PAGE_TITLES[tab]}</div><div className="topbar-sub">${periodLabel}</div></div></div>
      <div className="content">
        ${tab==='overview'&&html`<${OverviewPage} period=${period} year=${year} month=${month} onGoToTxns=${f=>{setTab('transactions');setTxnFilter(f);}} refreshKey=${refreshKey}/>`}
        ${tab==='transactions'&&html`<${TransactionsPage} accounts=${accounts||[]} categories=${categories||[]} period=${period} year=${year} month=${month} initialFilter=${txnFilter} onFilterUsed=${()=>setTxnFilter('')} onUpdate=${reloadAll}/>`}
        ${tab==='accounts'&&html`<${AccountsPage} accounts=${accounts||[]} onRefresh=${doRefreshBal} refreshing=${refreshingBal}/>`}
        ${tab==='categories'&&html`<${CategoriesPage} categories=${categories||[]} onUpdate=${reloadCats}/>`}
        ${tab==='rules'&&html`<${RulesPage} categories=${categories||[]}/>`}
        ${tab==='sync'&&html`<${ExternalSyncPage}/>`}
      </div>
    </main>
  </div>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
